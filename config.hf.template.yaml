# Minimal configuration used to bootstrap Hugging Face Docker Spaces.
# The entrypoint replaces __AUTH_DIR__ with a writable runtime path.

host: ""
port: 8317

remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: false
  panel-github-repository: "https://github.com/lankeqy007/Cli-Proxy-API-Management-Center"

auth-dir: "__AUTH_DIR__"

api-keys: []

debug: false

pprof:
  enable: false
  addr: "127.0.0.1:8316"

commercial-mode: false
logging-to-file: false
usage-statistics-enabled: false

quota-exceeded:
  switch-project: true
  switch-preview-model: true
  codex-auto-refill:
    enable: false
    provider-url: "https://gptfreetoken.pony.indevs.in"
    auth-mode: "api-key"
    api-key: ""
    api-key-env: "TOKEN_ATLAS_API_KEY"
    session-value: ""
    session-env: "TOKEN_ATLAS_SESSION"
    check-interval-seconds: 120
    min-claim-interval-seconds: 900
    timeout-seconds: 20
    low-watermark: 1
    target-ready: 3
    max-claim-per-run: 2
    require-consecutive-low: 2
    verify-after-import: true
    priority: -10
    note: "auto-refill"

host: ""
port: 7860

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: true
  secret-key: ""
  disable-control-panel: false
  panel-github-repository: "https://github.com/lankeqy007/Cli-Proxy-API-Management-Center"

auth-dir: "__AUTH_DIR__"

api-keys: []

debug: false
request-log: true
logging-to-file: false
logs-max-total-size-mb: 0
error-logs-max-files: 10
usage-statistics-enabled: true

proxy-url: ""
force-model-prefix: false
passthrough-headers: false

request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

quota-exceeded:
  switch-project: true
  switch-preview-model: true
  codex-auto-refill:
    enable: false
    provider-url: "https://gptfreetoken.pony.indevs.in"
    auth-mode: "api-key"
    api-key: ""
    api-key-env: "TOKEN_ATLAS_API_KEY"
    session-value: ""
    session-env: "TOKEN_ATLAS_SESSION"
    check-interval-seconds: 120
    min-claim-interval-seconds: 900
    timeout-seconds: 20
    low-watermark: 1
    target-ready: 3
    max-claim-per-run: 2
    require-consecutive-low: 2
    verify-after-import: true
    priority: -10
    note: "auto-refill"

routing:
  strategy: "round-robin"

ws-auth: false
nonstream-keepalive-interval: 0

commercial-mode: false

pprof:
  enable: false
  addr: "127.0.0.1:8316"
